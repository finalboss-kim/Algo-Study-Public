<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Algo Study Report</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #2a3d66;
            color: white;
            text-align: center;
            padding: 15px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            background-color: #2a3d66;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }
        .tab:hover {
            background-color: #1e2b41;
        }
        .tab.active {
            background-color: #1e2b41;
            border-bottom: 2px solid white;
        }
        .container {
            padding: 20px;
            margin-top: 10px;
            display: none;
        }
        .container.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #2a3d66;
            color: white;
        }
        .rank-col {
            width: 60px;
        }
    </style>
</head>
<body>
<header>
    <h1>Algo Study Report</h1>
</header>
<div id="top-users" style="padding: 15px; text-align: center; background-color: #f7f7f7; margin-bottom: 20px; border-bottom: 2px solid #ddd;">
    <h2 style="margin: 0;">🏆 1위 현황 🏆</h2>
    <p id="all-time-user">🌟 전체 1위: 데이터 로드 중...</p>
    <p id="previous-month-user">📅 이전 달 1위: 데이터 로드 중...</p>
    <p id="current-month-user">📅 이번 달 1위: 데이터 로드 중...</p>
    <p id="last-update" style="margin-top: 10px; color: #666; font-size: 14px;">업데이트 시각: 데이터 로드 중...</p>
</div>
<div class="tabs">
    <div class="tab active" onclick="showTab('leaderboard')">순위 & 패널티</div>
    <div class="tab" onclick="showTab('profile')">유저 프로필</div>
    <div class="tab" onclick="showTab('details')">상세 내역</div>
</div>
<div id="leaderboard" class="container active">
    <h2>순위 & 패널티</h2>
    <table>
        <thead>
            <tr>
                <th class="rank-col">순위</th>
                <th>유저</th>
                <th>맞힌 문제</th>
                <th>푼 문제</th>
            </tr>
        </thead>
        <tbody id="leaderboard-content">
            <!-- 동적 데이터 추가 -->
        </tbody>
    </table>
</div>
<div id="profile" class="container">
    <h2>유저 프로필</h2>
    <ul id="profile-content">
        <!-- 동적 데이터 추가 -->
    </ul>
</div>
<div id="details" class="container">
    <h2>상세 내역</h2>
    <table>
        <thead>
            <tr>
                <th>유저</th>
                <th>맞힘</th>
                <th>패널티</th>
                <th>풀었음</th>
            </tr>
        </thead>
        <tbody id="details-content">
            <!-- 동적 데이터 추가 -->
        </tbody>
    </table>
</div>
<script>
async function loadJsonAndRender() {
    try {
        const response = await fetch('https://finalboss-kim.github.io/Algo-Study-Public/userdata.json');
        if (!response.ok) {
            throw new Error(`HTTP 오류: ${response.status}`);
        }
        const data = await response.json();

        // Leaderboard 업데이트
        const sortedScores = Object.entries(data.scores).sort((a, b) => b[1].solved_count - a[1].solved_count);
        let leaderboardHtml = '';
        sortedScores.forEach(([user, score], index) => {
            leaderboardHtml += `<tr><td>${index + 1}</td><td>${user}</td><td>${score.solved_count}</td><td>${score.solved_problems}</td></tr>`;
        });
        document.getElementById('leaderboard-content').innerHTML = leaderboardHtml;

        // Profile 업데이트
        let profileHtml = '';
        Object.keys(data.scores).forEach(user => {
            profileHtml += `<li>${user}</li>`;
        });
        document.getElementById('profile-content').innerHTML = profileHtml;

        // Details 업데이트
        let detailsHtml = '';
        Object.entries(data.scores).forEach(([user, score]) => {
            detailsHtml += `<tr><td>${user}</td><td>${score.solved_count}</td><td>${score.penalty}</td><td>${score.solved_problems}</td></tr>`;
        });
        document.getElementById('details-content').innerHTML = detailsHtml;

        // 업데이트 시각
        document.getElementById('last-update').textContent = `업데이트 시각: ${data.last_update}`;
    } catch (error) {
        console.error('데이터 로드 실패:', error);
        document.getElementById('leaderboard-content').innerHTML = '<tr><td colspan="4">데이터 로드 실패</td></tr>';
        document.getElementById('profile-content').textContent = '데이터 로드 실패';
        document.getElementById('details-content').innerHTML = '<tr><td colspan="4">데이터 로드 실패</td></tr>';
    }
}

function showTab(tabId) {
    // 모든 컨테이너 숨기기
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    // 선택된 컨테이너만 활성화
    document.getElementById(tabId).classList.add('active');

    // 모든 탭 비활성화
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    // 클릭된 탭 활성화
    document.querySelector(`.tab[onclick="showTab('${tabId}')"]`).classList.add('active');
}

// JSON 데이터 로드 및 렌더링
loadJsonAndRender();
</script>
</body>
</html>
