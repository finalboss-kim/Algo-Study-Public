<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Algo Study Report</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #2a3d66;
            color: white;
            text-align: center;
            padding: 15px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            background-color: #2a3d66;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }
        .tab:hover {
            background-color: #1e2b41;
        }
        .tab.active {
            background-color: #1e2b41;
            border-bottom: 2px solid white;
        }
        .container {
            padding: 20px;
            margin-top: 10px;
            display: none;
        }
        .container.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #2a3d66;
            color: white;
        }
        .rank-col {
            width: 60px;
        }
    </style>
</head>
<body>
<header>
    <h1>Algo Study Report</h1>
</header>
<div id="top-users" style="padding: 15px; text-align: center; background-color: #f7f7f7; margin-bottom: 20px; border-bottom: 2px solid #ddd;">
    <h2 style="margin: 0;">🏆 1위 현황 🏆</h2>
    <p id="all-time-user">🌟 전체 1위: 데이터 로드 중...</p>
    <p id="previous-month-user">📅 이전 달 1위: 데이터 로드 중...</p>
    <p id="current-month-user">📅 이번 달 1위: 데이터 로드 중...</p>
</div>
<div class="tabs">
    <div class="tab active" onclick="showTab('leaderboard')">순위 & 패널티</div>
    <div class="tab" onclick="showTab('profile')">유저 프로필</div>
    <div class="tab" onclick="showTab('details')">상세 내역</div>
</div>
<div id="content" class="container active">
    <!-- 데이터 로드 후 내용 추가 -->
</div>

<script>
async function loadJsonAndRender() {
    try {
        const response = await fetch('userdata.json');
        if (!response.ok) throw new Error('JSON 파일을 로드하는 중 오류 발생.');
        const data = await response.json();

        // Update top users section
        document.getElementById('all-time-user').textContent = `🌟 전체 1위: ${data.top_users.all_time.user} (맞힌: ${data.top_users.all_time.solved_count}, 푼: ${data.top_users.all_time.solved_problems})`;
        document.getElementById('previous-month-user').textContent = data.top_users.previous_month
            ? `📅 이전 달 1위: ${data.top_users.previous_month.user} (맞힌: ${data.top_users.previous_month.solved_count}, 푼: ${data.top_users.previous_month.solved_problems})`
            : '📅 이전 달 1위: 데이터 없음';
        document.getElementById('current-month-user').textContent = `📅 이번 달 1위: ${data.top_users.current_month.user} (맞힌: ${data.top_users.current_month.solved_count}, 푼: ${data.top_users.current_month.solved_problems})`;

        // Populate leaderboard (example implementation)
        const sortedScores = Object.entries(data.scores).sort((a, b) => b[1].solved_count - a[1].solved_count);
        let leaderboardHtml = '<table><thead><tr><th>순위</th><th>유저</th><th>맞힌 문제</th><th>푼 문제</th></tr></thead><tbody>';
        sortedScores.forEach(([user, score], index) => {
            leaderboardHtml += `<tr><td>${index + 1}</td><td>${user}</td><td>${score.solved_count}</td><td>${score.solved_problems}</td></tr>`;
        });
        leaderboardHtml += '</tbody></table>';

        document.getElementById('content').innerHTML = leaderboardHtml;
    } catch (error) {
        console.error('데이터 로드 실패:', error);
        document.getElementById('content').textContent = '데이터 로드에 실패했습니다.';
    }
}

function showTab(tabId) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelector(`#${tabId}`).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
}

// Load JSON and render content
loadJsonAndRender();
</script>
</body>
</html>
